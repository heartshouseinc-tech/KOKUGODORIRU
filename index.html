<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こくごドリル🦉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
  :root{
    --sky:#E8F4FD;--blue:#4A90D9;--yellow:#FFD93D;--orange:#FF8C42;
    --green:#6BCB77;--pink:#FF6B9D;--white:#FFFFFF;--navy:#1A2B4A;
    --gray:#8899AA;--shadow:0 4px 20px rgba(74,144,217,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--sky);color:var(--navy);min-height:100vh;padding-bottom:40px;}

  /* ログイン */
  #loginScreen{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--sky);padding:20px;}
  #authLoading{min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--blue);}
  .login-card{background:#fff;border-radius:24px;padding:36px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(74,144,217,0.18);text-align:center;}
  .login-owl{font-size:68px;display:block;margin-bottom:8px;}
  .login-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:4px;}
  .login-sub{font-size:14px;color:var(--gray);margin-bottom:28px;line-height:1.6;}
  .login-field{width:100%;padding:14px 16px;border:2px solid #D0DFF0;border-radius:12px;font-family:inherit;font-size:16px;color:var(--navy);background:var(--sky);outline:none;margin-bottom:12px;transition:border-color .2s;}
  .login-field:focus{border-color:var(--blue);background:#fff;}
  .login-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--blue) 0%,#2E6DB4 100%);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:19px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(74,144,217,0.38);margin-top:4px;transition:transform .15s;}
  .login-btn:hover{transform:translateY(-2px);}
  .login-error{color:#CC0000;font-size:13px;margin-top:14px;min-height:18px;}

  /* ヘッダー */
  #appHeader{display:none;background:linear-gradient(135deg,var(--blue) 0%,#2E6DB4 100%);color:#fff;padding:14px 20px;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(74,144,217,0.4);position:sticky;top:0;z-index:100;}
  .hd-owl{font-size:32px;}
  .hd-title{font-size:20px;font-weight:900;letter-spacing:1px;}
  .hd-sub{font-size:10px;opacity:.8;margin-top:2px;}
  .hd-r{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
  .hd-email{font-size:10px;color:rgba(255,255,255,.7);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:right;}
  .hdr-btn{padding:6px 11px;border:2px solid rgba(255,255,255,.55);border-radius:10px;background:rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap;}
  .hdr-btn:hover{background:rgba(255,255,255,.25);}
  .adm-btn{display:none;background:rgba(255,217,61,.25);border:2px solid rgba(255,217,61,.6);color:#FFD93D;}

  /* モーダル共通 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:20px;padding:26px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.22);max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:16px;}
  .modal-field{width:100%;padding:12px 14px;border:2px solid #D0DFF0;border-radius:12px;font-family:inherit;font-size:15px;color:var(--navy);margin-bottom:10px;outline:none;transition:border-color .2s;}
  .modal-field:focus{border-color:var(--blue);}
  .modal-row{display:flex;gap:10px;margin-top:4px;}
  .modal-ok{flex:1;padding:12px;background:var(--green);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;}
  .modal-cancel{padding:12px 16px;background:#EEE;color:var(--gray);border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;}
  .modal-msg{font-size:13px;margin-top:10px;min-height:18px;}
  .modal-msg.ok{color:#27AE60;}.modal-msg.err{color:#CC0000;}
  .gen-btn{padding:8px 14px;background:var(--sky);border:2px solid var(--blue);border-radius:10px;color:var(--blue);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;}

  /* 管理パネル ユーザー一覧 */
  .user-item{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:#F0F4FA;border-radius:10px;margin-bottom:6px;}
  .user-name{font-weight:700;font-size:13px;}
  .user-email{font-size:11px;color:var(--gray);}
  .del-btn{background:#FFF0F0;border:1px solid #FCA5A5;color:#DC2626;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
  .admin-badge{background:#4A90D9;color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;}
  .divider-line{height:1px;background:#E0E8F0;margin:14px 0;}

  /* メイン */
  #appMain{display:none;}
  .main{max-width:600px;margin:0 auto;padding:20px 16px;}
  .card{background:#fff;border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}

  /* 作品選択 */
  .section-label{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:1px;margin-bottom:10px;}
  .story-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .story-btn{background:var(--sky);border:3px solid transparent;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;font-family:inherit;}
  .story-btn:hover{border-color:var(--blue);transform:translateY(-2px);}
  .story-btn.selected{background:#EBF4FF;border-color:var(--blue);box-shadow:0 0 0 2px rgba(74,144,217,.3);}
  .story-btn .story-icon{font-size:28px;display:block;margin-bottom:4px;}
  .story-btn .story-name{font-size:13px;font-weight:700;color:var(--navy);}
  .story-btn .story-author{font-size:11px;color:var(--gray);margin-top:2px;}
  .divider{text-align:center;color:var(--gray);font-size:12px;margin:10px 0;}
  .custom-input{width:100%;padding:12px 16px;border:2px solid #D0DFF0;border-radius:12px;font-family:inherit;font-size:16px;color:var(--navy);background:var(--sky);outline:none;transition:border-color .2s;}
  .custom-input:focus{border-color:var(--blue);background:#fff;}

  /* レベル */
  .level-row{display:flex;gap:8px;flex-wrap:wrap;}
  .level-chip{flex:1;min-width:60px;padding:10px 6px;border:3px solid transparent;border-radius:12px;text-align:center;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;transition:all .2s;background:var(--sky);}
  .level-chip .lv-icon{font-size:22px;display:block;margin-bottom:3px;}
  .level-chip[data-lv="1"]{color:#27AE60;}.level-chip[data-lv="1"].selected{background:#E8F8EE;border-color:#27AE60;}
  .level-chip[data-lv="2"]{color:var(--blue);}.level-chip[data-lv="2"].selected{background:#EBF4FF;border-color:var(--blue);}
  .level-chip[data-lv="3"]{color:var(--orange);}.level-chip[data-lv="3"].selected{background:#FFF3EB;border-color:var(--orange);}
  .level-chip[data-lv="4"]{color:var(--pink);}.level-chip[data-lv="4"].selected{background:#FFF0F5;border-color:var(--pink);}

  /* スタートボタン */
  .start-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--orange) 0%,#FF6B35 100%);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:20px;font-weight:900;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 20px rgba(255,140,66,.4);transition:all .2s;margin-top:8px;}
  .start-btn:hover{transform:translateY(-2px);}
  .start-btn:disabled{background:#CCC;box-shadow:none;cursor:not-allowed;transform:none;}

  /* ローディング */
  .loading-card{text-align:center;padding:40px 20px;}
  .owl-spin{font-size:64px;display:block;animation:bounce 1s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .loading-text{font-size:18px;font-weight:700;color:var(--blue);margin-top:16px;}
  .loading-sub{font-size:13px;color:var(--gray);margin-top:6px;}

  /* フクロウ吹き出し */
  .owl-section{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
  .owl-face{font-size:52px;flex-shrink:0;filter:drop-shadow(0 3px 6px rgba(0,0,0,.15));}
  .speech-bubble{background:var(--yellow);border-radius:18px 18px 18px 4px;padding:14px 16px;flex:1;position:relative;box-shadow:0 3px 12px rgba(255,217,61,.4);}
  .speech-bubble::before{content:'';position:absolute;left:-10px;top:16px;border:8px solid transparent;border-right-color:var(--yellow);border-left:0;}
  .bubble-level{font-size:10px;font-weight:700;color:#886600;letter-spacing:1px;margin-bottom:4px;}
  .bubble-question{font-size:18px;font-weight:700;color:var(--navy);line-height:1.6;}

  /* チャット */
  .chat-history{margin-bottom:12px;}
  .chat-msg{margin-bottom:10px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .chat-msg.user{text-align:right;}
  .chat-msg.user .bubble{display:inline-block;background:var(--blue);color:#fff;padding:10px 14px;border-radius:18px 18px 4px 18px;font-size:16px;max-width:85%;text-align:left;line-height:1.6;}
  .chat-msg.ai .bubble{display:inline-block;background:#fff;border:2px solid #D0DFF0;color:var(--navy);padding:10px 14px;border-radius:18px 18px 18px 4px;font-size:16px;max-width:90%;line-height:1.6;}
  .chat-msg .who{font-size:10px;color:var(--gray);margin-bottom:3px;font-weight:700;}

  /* 答えエリア */
  .answer-area{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
  .answer-label{font-size:13px;font-weight:700;color:var(--gray);margin-bottom:8px;}
  .answer-textarea{width:100%;min-height:80px;padding:12px;border:2px solid #D0DFF0;border-radius:12px;font-family:inherit;font-size:18px;color:var(--navy);resize:none;outline:none;line-height:1.6;transition:border-color .2s;}
  .answer-textarea:focus{border-color:var(--blue);}
  .btn-row{display:flex;gap:10px;}
  .send-btn{flex:1;padding:14px;background:linear-gradient(135deg,var(--green) 0%,#45A55A 100%);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(107,203,119,.4);transition:all .2s;}
  .send-btn:hover{transform:translateY(-2px);}
  .send-btn:disabled{background:#CCC;box-shadow:none;transform:none;cursor:not-allowed;}
  .next-btn{padding:14px 20px;background:linear-gradient(135deg,var(--blue) 0%,#2E6DB4 100%);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(74,144,217,.4);}

  /* レベルバッジ */
  .level-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:14px;}
  .level-badge.lv1{background:#E8F8EE;color:#27AE60;}.level-badge.lv2{background:#EBF4FF;color:var(--blue);}
  .level-badge.lv3{background:#FFF3EB;color:var(--orange);}.level-badge.lv4{background:#FFF0F5;color:var(--pink);}

  /* 完了 */
  .complete-card{text-align:center;padding:30px 20px;}
  .complete-icon{font-size:72px;display:block;margin-bottom:12px;}
  .complete-title{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:8px;}
  .complete-sub{font-size:15px;color:var(--gray);margin-bottom:24px;line-height:1.8;white-space:pre-line;}
  .stars{font-size:36px;letter-spacing:4px;margin-bottom:20px;}
  .retry-btn{padding:14px 32px;background:linear-gradient(135deg,var(--yellow) 0%,#FFC107 100%);color:var(--navy);border:none;border-radius:14px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(255,217,61,.4);}

  /* 学習きろく */
  .rec-item{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
  .rec-story{font-size:16px;font-weight:700;color:var(--navy);}
  .rec-meta{font-size:12px;color:var(--gray);margin-top:4px;}
  .rec-levels{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .rec-lv{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700;}

  /* 画面切替 */
  .screen{display:none;}.screen.active{display:block;}
  .error-msg{background:#FFE8E8;border:2px solid #FF6B6B;border-radius:12px;padding:12px 16px;font-size:14px;color:#CC0000;margin-bottom:12px;display:none;}
  .error-msg.show{display:block;}
</style>
</head>
<body>

<!-- ローディング -->
<div id="authLoading">🦉 よみこみちゅう…</div>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-owl">🦉</span>
    <div class="login-title">こくごドリル</div>
    <div class="login-sub">めーるアドレスと<br>パスワードでログインしてね</div>
    <input class="login-field" type="email" id="zEmail" placeholder="メールアドレス" autocomplete="email">
    <input class="login-field" type="password" id="zPass" placeholder="パスワード" autocomplete="current-password">
    <button class="login-btn" onclick="zLogin()">🔑 ログイン</button>
    <div class="login-error" id="zErr"></div>
  </div>
</div>

<!-- ヘッダー -->
<div id="appHeader">
  <div class="hd-owl">🦉</div>
  <div>
    <div class="hd-title">こくごドリル</div>
    <div class="hd-sub">かんがえるちからをそだてよう！</div>
  </div>
  <div class="hd-r">
    <div class="hd-email" id="hd-email"></div>
    <button class="hdr-btn adm-btn" id="adminBtn" onclick="openAdmin()">⚙️ 管理</button>
    <button class="hdr-btn" onclick="openPassModal()">🔒 PW</button>
    <button class="hdr-btn" onclick="zLogout()">ログアウト</button>
  </div>
</div>

<!-- パスワード変更モーダル -->
<div class="modal-overlay" id="pass-modal">
  <div class="modal-box">
    <div class="modal-title">🔒 パスワードをかえる</div>
    <input class="modal-field" type="password" id="new-pass1" placeholder="あたらしいパスワード（6もじ以上）">
    <input class="modal-field" type="password" id="new-pass2" placeholder="もういちど いれてね">
    <div class="modal-row">
      <button class="modal-ok" onclick="doChangePass()">かえる ✓</button>
      <button class="modal-cancel" onclick="closePassModal()">もどる</button>
    </div>
    <div class="modal-msg" id="pass-msg"></div>
  </div>
</div>

<!-- 管理者パネル -->
<div class="modal-overlay" id="adminPanel">
  <div class="modal-box">
    <div class="modal-title">⚙️ ユーザー管理</div>
    <input class="modal-field" type="text" id="nuName" placeholder="表示名（例：たろう）">
    <input class="modal-field" type="email" id="nuEmail" placeholder="メールアドレス">
    <input class="modal-field" type="text" id="nuPass" placeholder="仮パスワード" readonly>
    <button class="gen-btn" onclick="genPass()">🎲 パスワード自動生成</button>
    <div class="modal-row">
      <button class="modal-ok" id="addUserBtn" onclick="addUser()">登録する</button>
      <button class="modal-cancel" onclick="closeAdmin()">とじる</button>
    </div>
    <div class="modal-msg" id="nuErr"></div>
    <div class="divider-line"></div>
    <div style="font-size:12px;font-weight:700;color:var(--gray);margin-bottom:8px;">登録ユーザー一覧</div>
    <div id="userList"></div>
  </div>
</div>

<!-- アプリ本体 -->
<div id="appMain">
<div class="main">

  <!-- 画面1: 作品選択 -->
  <div class="screen active" id="screen-select">
    <div class="card">
      <div class="section-label">📚 どのおはなし？</div>
      <div class="story-grid">
        <button class="story-btn" onclick="selectStory(this,'手袋を買いに','新美南吉')">
          <span class="story-icon">🧤</span>
          <span class="story-name">てぶくろを かいに</span>
          <span class="story-author">にいみなんきち</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'ごんぎつね','新美南吉')">
          <span class="story-icon">🦊</span>
          <span class="story-name">ごんぎつね</span>
          <span class="story-author">にいみなんきち</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'注文の多い料理店','宮沢賢治')">
          <span class="story-icon">🍽️</span>
          <span class="story-name">ちゅうもんの おおい りょうりてん</span>
          <span class="story-author">みやざわけんじ</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'セロ弾きのゴーシュ','宮沢賢治')">
          <span class="story-icon">🎻</span>
          <span class="story-name">セロひきの ゴーシュ</span>
          <span class="story-author">みやざわけんじ</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'桃太郎','日本昔話')">
          <span class="story-icon">🍑</span>
          <span class="story-name">ももたろう</span>
          <span class="story-author">にほんのむかしばなし</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'浦島太郎','日本昔話')">
          <span class="story-icon">🐢</span>
          <span class="story-name">うらしまたろう</span>
          <span class="story-author">にほんのむかしばなし</span>
        </button>
      </div>
      <div class="divider">― または じぶんで いれる ―</div>
      <input class="custom-input" type="text" id="custom-story"
        placeholder="おはなしの なまえを かいてね" oninput="onCustomInput(this.value)">
    </div>
    <div class="card">
      <div class="section-label">🎯 どのレベルから？</div>
      <div class="level-row">
        <button class="level-chip selected" data-lv="1" onclick="selectLevel(this,1)">
          <span class="lv-icon">📖</span><span>じじつ</span>
        </button>
        <button class="level-chip" data-lv="2" onclick="selectLevel(this,2)">
          <span class="lv-icon">🤔</span><span>りゆう</span>
        </button>
        <button class="level-chip" data-lv="3" onclick="selectLevel(this,3)">
          <span class="lv-icon">💭</span><span>きもち</span>
        </button>
        <button class="level-chip" data-lv="4" onclick="selectLevel(this,4)">
          <span class="lv-icon">✨</span><span>テーマ</span>
        </button>
      </div>
    </div>
    <div class="error-msg" id="err-select">おはなしをえらんでね！</div>
    <button class="start-btn" onclick="startDrill()">🦉 スタート！</button>
    <div style="margin-top:20px;" id="rec-section">
      <div class="section-label" style="padding:0 4px;">📊 まえのきろく</div>
      <div id="rec-list"><div style="color:var(--gray);font-size:13px;padding:8px 4px;">きろくはまだないよ</div></div>
    </div>
  </div>

  <!-- 画面2: ローディング -->
  <div class="screen" id="screen-loading">
    <div class="card loading-card">
      <span class="owl-spin">🦉</span>
      <div class="loading-text">もんだいをつくっているよ…</div>
      <div class="loading-sub">すこしまってね ✨</div>
    </div>
  </div>

  <!-- 画面3: ドリル -->
  <div class="screen" id="screen-drill">
    <div id="level-badge-wrap"></div>
    <div class="owl-section">
      <div class="owl-face">🦉</div>
      <div class="speech-bubble">
        <div class="bubble-level" id="bubble-level-label"></div>
        <div class="bubble-question" id="bubble-question"></div>
      </div>
    </div>
    <div class="chat-history" id="chat-history"></div>
    <div class="answer-area">
      <div class="answer-label">🖊 こたえをかいてね</div>
      <textarea class="answer-textarea" id="answer-input" placeholder="ここにこたえをかこう…" rows="3"></textarea>
    </div>
    <div class="error-msg" id="err-drill">こたえをかいてからおくってね！</div>
    <div class="btn-row">
      <button class="send-btn" id="send-btn" onclick="sendAnswer()">✉️ おくる</button>
      <button class="next-btn" id="next-level-btn" onclick="nextLevel()" style="display:none">つぎへ →</button>
    </div>
  </div>

  <!-- 画面4: 完了 -->
  <div class="screen" id="screen-complete">
    <div class="card complete-card">
      <span class="complete-icon">🎉</span>
      <div class="stars">⭐⭐⭐⭐</div>
      <div class="complete-title">ぜんぶできたよ！</div>
      <div class="complete-sub" id="complete-msg"></div>
      <button class="retry-btn" onclick="goHome()">🏠 もどる</button>
    </div>
  </div>

</div><!-- /.main -->

<script>
// ===== 定数 =====
var EP  = 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY = 'HeartsHouse2026Key';

var LEVEL_INFO = {
  1:{label:'レベル１ じじつ', icon:'📖', cls:'lv1'},
  2:{label:'レベル２ りゆう', icon:'🤔', cls:'lv2'},
  3:{label:'レベル３ きもち', icon:'💭', cls:'lv3'},
  4:{label:'レベル４ テーマ', icon:'✨', cls:'lv4'},
};

// ===== 状態 =====
var currentUser = null;
var state = {story:'',author:'',level:1,questions:[],currentQ:0,chatHistory:[],turnCount:0};
var sessionRecord = {story:'',startLv:1,completedLvs:[],startedAt:null};

// ===== Firebase helper =====
function fb(){ return window.__fb; }

function initAuth(){
  if(!window.__fb){
    var waited=0, timer=setInterval(function(){
      waited+=200;
      if(window.__fb){ clearInterval(timer); initAuth(); }
      else if(waited>=6000){
        clearInterval(timer);
        document.getElementById('authLoading').style.display='none';
        document.getElementById('loginScreen').style.display='flex';
      }
    },200);
    return;
  }
  fb().onAuthStateChanged(fb().auth, async function(user){
    if(user){
      currentUser = user;
      document.getElementById('hd-email').textContent = user.email;
      // isAdmin確認
      try{
        var snap = await fb().getDoc(fb().doc(fb().db,'users',user.uid));
        if(!snap.exists()){
          await fb().setDoc(fb().doc(fb().db,'users',user.uid),{
            uid:user.uid, email:user.email,
            name:user.email.split('@')[0],
            isAdmin:false, createdAt:fb().serverTimestamp()
          });
        }
        if(snap.exists() && snap.data().isAdmin){
          document.getElementById('adminBtn').style.display='inline-block';
        }
      }catch(e){}
      showApp();
    } else {
      document.getElementById('authLoading').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
    }
  });
}
document.addEventListener('DOMContentLoaded', initAuth);

function showApp(){
  document.getElementById('authLoading').style.display='none';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('appMain').style.display='block';
  loadRecords();
}

// ===== ログイン/アウト =====
async function zLogin(){
  var email=document.getElementById('zEmail').value.trim();
  var pass=document.getElementById('zPass').value;
  var err=document.getElementById('zErr'); err.textContent='';
  if(!email||!pass){err.textContent='めーるとパスワードをいれてね';return;}
  try{ await fb().signInWithEmailAndPassword(fb().auth,email,pass); }
  catch(e){
    var m={
      'auth/invalid-credential':'めーるかパスワードがちがうよ',
      'auth/user-not-found':'このめーるはとうろくされていないよ',
      'auth/wrong-password':'パスワードがちがうよ',
      'auth/too-many-requests':'しばらくたってからためしてね',
    };
    err.textContent = m[e.code]||'ログインできなかったよ…もういちど';
  }
}
async function zLogout(){
  if(!confirm('ログアウトしますか？'))return;
  await fb().signOut(fb().auth);
  currentUser=null;
  document.getElementById('adminBtn').style.display='none';
  document.getElementById('appHeader').style.display='none';
  document.getElementById('appMain').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

// ===== PW変更 =====
function openPassModal(){
  document.getElementById('new-pass1').value='';
  document.getElementById('new-pass2').value='';
  document.getElementById('pass-msg').textContent='';
  document.getElementById('pass-msg').className='modal-msg';
  document.getElementById('pass-modal').classList.add('show');
}
function closePassModal(){ document.getElementById('pass-modal').classList.remove('show'); }
async function doChangePass(){
  var p1=document.getElementById('new-pass1').value;
  var p2=document.getElementById('new-pass2').value;
  var msgEl=document.getElementById('pass-msg');
  if(p1.length<6){msgEl.className='modal-msg err';msgEl.textContent='6もじ以上いれてね';return;}
  if(p1!==p2){msgEl.className='modal-msg err';msgEl.textContent='パスワードがあわないよ';return;}
  try{
    var {updatePassword} = fb();
    await updatePassword(fb().auth.currentUser, p1);
    msgEl.className='modal-msg ok'; msgEl.textContent='パスワードをかえたよ！✓';
    setTimeout(closePassModal,1800);
  }catch(e){
    msgEl.className='modal-msg err';
    msgEl.textContent = e.code==='auth/requires-recent-login'
      ? 'いちどログアウトして、もういちどログインしてからためしてね'
      : 'エラーがおきたよ…もういちどためしてね';
  }
}

// ===== 管理者パネル =====
function openAdmin(){ document.getElementById('adminPanel').classList.add('show'); loadUsers(); }
function closeAdmin(){
  document.getElementById('adminPanel').classList.remove('show');
  ['nuName','nuEmail','nuPass'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('nuErr').textContent='';
}
function genPass(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
  var p=''; for(var i=0;i<10;i++) p+=c[Math.floor(Math.random()*c.length)];
  document.getElementById('nuPass').value=p;
}
async function addUser(){
  var name=document.getElementById('nuName').value.trim();
  var email=document.getElementById('nuEmail').value.trim();
  var pass=document.getElementById('nuPass').value;
  var err=document.getElementById('nuErr'); err.textContent=''; err.style.color='#DC2626';
  if(!name){err.textContent='なまえをいれてね';return;}
  if(!email){err.textContent='めーるアドレスをいれてね';return;}
  if(pass.length<6){err.textContent='パスワードを じどうせいせい してね';return;}
  var btn=document.getElementById('addUserBtn'); btn.textContent='とうろく中...'; btn.disabled=true;
  try{
    var f2=fb();
    var cred=await f2.createUserWithEmailAndPassword(f2.auth,email,pass);
    await f2.setDoc(f2.doc(f2.db,'users',cred.user.uid),{
      uid:cred.user.uid,name:name,email:email,isAdmin:false,createdAt:f2.serverTimestamp()
    });
    err.style.color='#27AE60'; err.textContent='✅ '+name+' をとうろくしました！';
    ['nuName','nuEmail','nuPass'].forEach(function(id){document.getElementById(id).value='';});
    loadUsers();
  }catch(e){
    var m={'auth/email-already-in-use':'このめーるはすでにつかわれているよ','auth/invalid-email':'めーるのかたちがただしくないよ','auth/weak-password':'パスワードがみじかすぎるよ'};
    err.textContent='エラー: '+(m[e.code]||e.message);
  }
  btn.textContent='登録する'; btn.disabled=false;
}
async function loadUsers(){
  var el=document.getElementById('userList');
  el.innerHTML='<div style="color:var(--gray);font-size:12px;">よみこみ中...</div>';
  try{
    var f2=fb();
    var snap=await f2.getDocs(f2.query(f2.collection(f2.db,'users'),f2.orderBy('name')));
    if(snap.empty){el.innerHTML='<div style="color:var(--gray);font-size:12px;">ユーザーなし</div>';return;}
    var html='';
    snap.forEach(function(d){
      var u=d.data();
      var ab=u.isAdmin?'<span class="admin-badge">管理者</span>':'';
      var nm=(u.name||'名前なし').replace(/"/g,'&quot;');
      html+='<div class="user-item"><div><div class="user-name">'+(u.name||'名前なし')+ab+'</div>'
        +'<div class="user-email">'+(u.email||d.id)+'</div></div>'
        +'<button class="del-btn" data-uid="'+d.id+'" data-nm="'+nm+'" onclick="deleteUser(this.dataset.uid,this.dataset.nm,this)">削除</button></div>';
    });
    el.innerHTML=html;
  }catch(e){el.innerHTML='<div style="color:#DC2626;font-size:12px;">エラー: '+e.message+'</div>';}
}
async function deleteUser(uid,name,btn){
  if(!confirm(name+'を削除しますか？'))return;
  btn.textContent='削除中...'; btn.disabled=true;
  try{
    var f2=fb(); await f2.deleteDoc(f2.doc(f2.db,'users',uid)); loadUsers();
  }catch(e){ alert('削除エラー: '+e.message); btn.textContent='削除'; btn.disabled=false; }
}

// ===== Firestore 学習記録 =====
async function saveRecord(completedLvs){
  if(!currentUser) return;
  try{
    var f2=fb();
    var recId = currentUser.uid+'_'+Date.now();
    await f2.setDoc(f2.doc(f2.db,'drillRecords',recId),{
      uid: currentUser.uid,
      email: currentUser.email,
      story: state.story,
      author: state.author||'',
      startLevel: state.level,
      completedLevels: completedLvs,
      totalLevels: completedLvs.length,
      createdAt: f2.serverTimestamp(),
    });
  }catch(e){ console.warn('record save error',e); }
}
async function loadRecords(){
  if(!currentUser) return;
  var el=document.getElementById('rec-list');
  try{
    var f2=fb();
    var snap=await f2.getDocs(
      f2.query(
        f2.collection(f2.db,'drillRecords'),
        f2.orderBy('createdAt','desc')
      )
    );
    // 自分のだけ
    var mine=[];
    snap.forEach(function(d){ if(d.data().uid===currentUser.uid) mine.push(d.data()); });
    mine=mine.slice(0,5);
    if(mine.length===0){
      el.innerHTML='<div style="color:var(--gray);font-size:13px;padding:8px 4px;">きろくはまだないよ</div>';
      return;
    }
    el.innerHTML=mine.map(function(r){
      var lvBadges=(r.completedLevels||[]).map(function(lv){
        var info=LEVEL_INFO[lv]||{icon:'',cls:'lv1'};
        return '<span class="rec-lv level-badge '+info.cls+'" style="padding:2px 8px;font-size:10px;">'+info.icon+' Lv'+lv+'</span>';
      }).join('');
      var d=r.createdAt&&r.createdAt.toDate?r.createdAt.toDate().toLocaleDateString('ja-JP'):'';
      return '<div class="rec-item">'
        +'<div class="rec-story">'+r.story+'</div>'
        +'<div class="rec-meta">'+d+' ／ '+(r.author||'')+'</div>'
        +'<div class="rec-levels">'+lvBadges+'</div></div>';
    }).join('');
  }catch(e){ el.innerHTML=''; }
}

// ===== 画面切替 =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

// ===== 作品選択 =====
function selectStory(btn,name,author){
  document.querySelectorAll('.story-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  state.story=name; state.author=author;
  document.getElementById('custom-story').value='';
}
function onCustomInput(val){
  document.querySelectorAll('.story-btn').forEach(function(b){b.classList.remove('selected');});
  state.story=val.trim(); state.author='';
}
function selectLevel(btn,lv){
  document.querySelectorAll('.level-chip').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected'); state.level=lv;
}

// ===== スタート =====
async function startDrill(){
  var errEl=document.getElementById('err-select');
  if(!state.story){errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  state.questions=[]; state.currentQ=0; state.chatHistory=[]; state.turnCount=0;
  sessionRecord={story:state.story,startLv:state.level,completedLvs:[],startedAt:Date.now()};
  document.getElementById('chat-history').innerHTML='';
  showScreen('loading');
  await generateQuestions();
}

// ===== 問い生成（1ステップ・確実版） =====
async function generateQuestions(){
  var startLv=state.level;
  var levels=[]; for(var l=startLv;l<=4;l++) levels.push(l);

  try{
    var r=await callAI({
      responseSchema:{
        type:'object',
        properties:{
          questions:{
            type:'array',
            items:{
              type:'object',
              properties:{level:{type:'number'},question:{type:'string'}},
              required:['level','question'],
            },
          },
        },
        required:['questions'],
      },
      systemPrompt:'あなたは小学1年生向け国語読解の問いを作る先生です。必ず指定された作品の内容に関係した問いだけを作ってください。ひらがな・カタカナ中心で漢字は最小限にしてください。',
      userMessage:'【作品】「'+state.story+'」（'+(state.author||'日本の昔話・童話')+'）\n\n以下のレベルの問いを各1問ずつ、必ず「'+state.story+'」のお話に関係した内容で作ってください：\nレベル1（じじつ）：「'+state.story+'」の中に書いてあることをそのまま答える問い\nレベル2（りゆう）：「'+state.story+'」でなぜそうなったか理由を考える問い\nレベル3（きもち）：「'+state.story+'」の登場人物の気持ちを想像する問い\nレベル4（テーマ）：「'+state.story+'」全体で作者が伝えたかったことを考える問い\n\n※levelは数字（1〜4）、questionはひらがな中心の文字列でJSONに入れてください。',
    });
    var parsed=parseJSON(extractText(r));
    if(parsed&&parsed.questions&&parsed.questions.length>0){
      state.questions=parsed.questions;
    }else throw new Error('parse fail');
  }catch(e){
    state.questions=levels.map(function(l){return {level:l,question:defaultQuestion(l,state.story)};});
  }
  showDrillScreen();
}

function defaultQuestion(lv,story){
  return {
    1:'「'+story+'」に でてくる とうじょうじんぶつは だれですか？',
    2:'「'+story+'」で、とうじょうじんぶつは なぜ そうしたのでしょう？',
    3:'「'+story+'」の とうじょうじんぶつは どんな きもちだったと おもいますか？',
    4:'「'+story+'」で、さくしゃは なにを つたえたかったと おもいますか？',
  }[lv]||'';
}

// ===== ドリル表示 =====
function showDrillScreen(){ showScreen('drill'); renderQuestion(); }

function renderQuestion(){
  var q=state.questions[state.currentQ];
  if(!q){showComplete();return;}
  var info=LEVEL_INFO[q.level];
  state.turnCount=0; state.chatHistory=[];
  document.getElementById('level-badge-wrap').innerHTML='<div class="level-badge '+info.cls+'">'+info.icon+' '+info.label+'</div>';
  document.getElementById('bubble-level-label').textContent=info.label;
  document.getElementById('bubble-question').textContent=q.question;
  document.getElementById('chat-history').innerHTML='';
  document.getElementById('answer-input').value='';
  document.getElementById('send-btn').style.display='';
  document.getElementById('next-level-btn').style.display='none';
  document.getElementById('err-drill').classList.remove('show');
}

// ===== 答え送信 =====
async function sendAnswer(){
  var answer=document.getElementById('answer-input').value.trim();
  if(!answer){document.getElementById('err-drill').classList.add('show');return;}
  document.getElementById('err-drill').classList.remove('show');
  addChatMsg('user',answer);
  document.getElementById('answer-input').value='';
  document.getElementById('send-btn').disabled=true;

  var q=state.questions[state.currentQ];
  state.turnCount++;
  state.chatHistory.push({role:'user',parts:[{text:answer}]});

  try{
    var r=await callAI({
      systemPrompt:buildSystemPrompt(q.level,state.story,q.question),
      messages:state.chatHistory,
    });
    var aiText=extractText(r);
    state.chatHistory.push({role:'model',parts:[{text:aiText}]});
    addChatMsg('ai',aiText);
    if(state.turnCount>=2) document.getElementById('next-level-btn').style.display='';
  }catch(e){
    addChatMsg('ai','ごめんね、もういちどおくってみてね 🦉');
  }
  document.getElementById('send-btn').disabled=false;
}

function buildSystemPrompt(level,story,question){
  var base='あなたは小学1年生の国語の先生「フクロウ先生」です。\n'
    +'「'+story+'」についての問い「'+question+'」に子どもが答えてくれています。\n'
    +'【必須ルール】\n'
    +'・ひらがな中心のやさしい言葉のみ\n'
    +'・答えを直接言わない\n'
    +'・「どこにそう書いてあった？」「なぜそうおもった？」など深掘り質問を1つ必ず入れる\n'
    +'・ほめ言葉から始める\n'
    +'・2〜4文以内。絵文字1〜2個使う';
  var guide={
    1:'事実の問いです。本文のどこに書いてあるか確認させてください。',
    2:'理由の問いです。「なぜかな？」と理由を引き出してください。',
    3:'気持ちの問いです。共感してから「どんなきもち？」と広げてください。',
    4:'テーマの問いです。考えたプロセスをほめてください。正解不正解より大切に。',
  };
  return base+'\n'+guide[level];
}

// ===== チャットUI =====
function addChatMsg(role,text){
  var el=document.createElement('div');
  el.className='chat-msg '+role;
  el.innerHTML='<div class="who">'+(role==='user'?'あなた':'🦉 フクロウせんせい')+'</div><div class="bubble">'+escHtml(text)+'</div>';
  document.getElementById('chat-history').appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'end'});
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ===== 次のレベル =====
function nextLevel(){
  var q=state.questions[state.currentQ];
  if(q) sessionRecord.completedLvs.push(q.level);
  state.currentQ++;
  if(state.currentQ>=state.questions.length){ showComplete(); }
  else { renderQuestion(); window.scrollTo(0,0); }
}

// ===== 完了 =====
async function showComplete(){
  var q=state.questions[state.currentQ];
  if(q) sessionRecord.completedLvs.push(q.level);
  await saveRecord(sessionRecord.completedLvs);
  document.getElementById('complete-msg').textContent=
    '「'+state.story+'」を よくかんがえたね！✨\nじつは、よむたびにあたらしいことに きづくんだよ。\nまたやってみてね！';
  showScreen('complete');
}
async function goHome(){
  state={story:'',author:'',level:1,questions:[],currentQ:0,chatHistory:[],turnCount:0};
  document.querySelectorAll('.story-btn').forEach(function(b){b.classList.remove('selected');});
  document.querySelectorAll('.level-chip').forEach(function(b){b.classList.remove('selected');});
  document.querySelector('.level-chip[data-lv="1"]').classList.add('selected');
  document.getElementById('custom-story').value='';
  showScreen('select');
  await loadRecords();
}

// ===== API =====
async function callAI(opts){
  var body={
    model:'gemini-2.5-flash',
    system:opts.systemPrompt||'',
    contents:opts.messages||[{role:'user',parts:[{text:opts.userMessage}]}],
  };
  if(opts.useSearch) body.useSearch=true;
  if(opts.responseSchema) body.responseSchema=opts.responseSchema;
  var res=await fetch(EP,{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Access-Key':KEY},
    body:JSON.stringify(body),
  });
  if(!res.ok) throw new Error('API Error '+res.status);
  return await res.json();
}
function extractText(d){
  var data=d.data??d;
  return (data&&data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||data.text||d.text||'';
}
function parseJSON(text){
  try{return JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){return null;}
}
</script>
