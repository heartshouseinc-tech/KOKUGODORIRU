<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こくごドリル🦉</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
    authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
    projectId: "kensetsu-nippo-842a2",
    storageBucket: "kensetsu-nippo-842a2.firebasestorage.app",
    messagingSenderId: "702880974315",
    appId: "1:702880974315:web:985321dc9180046629c5ae"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window._auth = auth;
  window._signIn = (email, pass) => signInWithEmailAndPassword(auth, email, pass);
  window._signOut = () => signOut(auth);
  window._updatePassword = (newPass) => updatePassword(auth.currentUser, newPass);
  window._onAuthStateChanged = (cb) => onAuthStateChanged(auth, cb);

  // 認証状態を監視
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('app-wrap').style.display = 'block';
      document.getElementById('user-email').textContent = user.email;
    } else {
      document.getElementById('login-wrap').style.display = 'flex';
      document.getElementById('app-wrap').style.display = 'none';
    }
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  :root {
    --sky: #E8F4FD;
    --blue: #4A90D9;
    --yellow: #FFD93D;
    --orange: #FF8C42;
    --green: #6BCB77;
    --pink: #FF6B9D;
    --white: #FFFFFF;
    --navy: #1A2B4A;
    --gray: #8899AA;
    --shadow: 0 4px 20px rgba(74,144,217,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--sky);
    color: var(--navy);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ===== ログイン画面 ===== */
  #login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--sky);
    padding: 20px;
  }
  .login-card {
    background: white;
    border-radius: 24px;
    padding: 36px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(74,144,217,0.18);
    text-align: center;
  }
  .login-owl { font-size: 68px; display: block; margin-bottom: 8px; }
  .login-title { font-size: 24px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: var(--gray); margin-bottom: 28px; line-height: 1.6; }
  .login-field {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #D0DFF0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    color: var(--navy);
    background: var(--sky);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .login-field:focus { border-color: var(--blue); background: white; }
  .login-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue) 0%, #2E6DB4 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(74,144,217,0.38);
    margin-top: 4px;
    transition: transform 0.15s;
  }
  .login-btn:hover { transform: translateY(-2px); }
  .login-error { color: #CC0000; font-size: 13px; margin-top: 14px; min-height: 18px; }

  /* ===== ヘッダー ===== */
  .header {
    background: linear-gradient(135deg, var(--blue) 0%, #2E6DB4 100%);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 3px 12px rgba(74,144,217,0.4);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-owl { font-size: 32px; }
  .header-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
  .header-sub { font-size: 10px; opacity: 0.8; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .hdr-btn {
    padding: 7px 12px;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.25); }
  .hdr-email { font-size: 10px; color: rgba(255,255,255,0.7); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== モーダル ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 26px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }
  .modal-title { font-size: 18px; font-weight: 900; color: var(--navy); margin-bottom: 16px; }
  .modal-field {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #D0DFF0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    color: var(--navy);
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field:focus { border-color: var(--blue); }
  .modal-row { display: flex; gap: 10px; margin-top: 4px; }
  .modal-ok { flex:1; padding:12px; background:var(--green); color:white; border:none; border-radius:12px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; }
  .modal-cancel { padding:12px 16px; background:#EEE; color:var(--gray); border:none; border-radius:12px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; }
  .modal-msg { font-size:13px; margin-top:10px; min-height:18px; }
  .modal-msg.ok { color:#27AE60; }
  .modal-msg.err { color:#CC0000; }

  /* ===== メインコンテンツ ===== */
  .main { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
  .card { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }

  /* 作品選択 */
  .section-label { font-size: 12px; font-weight: 700; color: var(--blue); letter-spacing: 1px; margin-bottom: 10px; }
  .story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .story-btn {
    background: var(--sky);
    border: 3px solid transparent;
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .story-btn:hover { border-color: var(--blue); transform: translateY(-2px); }
  .story-btn.selected { background: #EBF4FF; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(74,144,217,0.3); }
  .story-btn .story-icon { font-size: 28px; display: block; margin-bottom: 4px; }
  .story-btn .story-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .story-btn .story-author { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .divider { text-align: center; color: var(--gray); font-size: 12px; margin: 10px 0; }
  .custom-input { width:100%; padding:12px 16px; border:2px solid #D0DFF0; border-radius:12px; font-family:inherit; font-size:16px; color:var(--navy); background:var(--sky); outline:none; transition:border-color 0.2s; }
  .custom-input:focus { border-color: var(--blue); background:white; }

  /* レベル選択 */
  .level-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .level-chip { flex:1; min-width:60px; padding:10px 6px; border:3px solid transparent; border-radius:12px; text-align:center; cursor:pointer; font-family:inherit; font-weight:700; font-size:12px; transition:all 0.2s; background:var(--sky); }
  .level-chip .lv-icon { font-size:22px; display:block; margin-bottom:3px; }
  .level-chip[data-lv="1"] { color:#27AE60; }
  .level-chip[data-lv="1"].selected { background:#E8F8EE; border-color:#27AE60; }
  .level-chip[data-lv="2"] { color:var(--blue); }
  .level-chip[data-lv="2"].selected { background:#EBF4FF; border-color:var(--blue); }
  .level-chip[data-lv="3"] { color:var(--orange); }
  .level-chip[data-lv="3"].selected { background:#FFF3EB; border-color:var(--orange); }
  .level-chip[data-lv="4"] { color:var(--pink); }
  .level-chip[data-lv="4"].selected { background:#FFF0F5; border-color:var(--pink); }

  /* スタートボタン */
  .start-btn { width:100%; padding:18px; background:linear-gradient(135deg,var(--orange) 0%,#FF6B35 100%); color:white; border:none; border-radius:16px; font-family:inherit; font-size:20px; font-weight:900; cursor:pointer; letter-spacing:2px; box-shadow:0 6px 20px rgba(255,140,66,0.4); transition:all 0.2s; margin-top:8px; }
  .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,140,66,0.5); }
  .start-btn:disabled { background:#CCC; box-shadow:none; cursor:not-allowed; transform:none; }

  /* ローディング */
  .loading-card { text-align:center; padding:40px 20px; }
  .owl-spin { font-size:64px; display:block; animation:bounce 1s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .loading-text { font-size:18px; font-weight:700; color:var(--blue); margin-top:16px; }
  .loading-sub { font-size:13px; color:var(--gray); margin-top:6px; }

  /* フクロウ吹き出し */
  .owl-section { display:flex; align-items:flex-start; gap:12px; margin-bottom:16px; }
  .owl-face { font-size:52px; flex-shrink:0; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.15)); }
  .speech-bubble { background:var(--yellow); border-radius:18px 18px 18px 4px; padding:14px 16px; flex:1; position:relative; box-shadow:0 3px 12px rgba(255,217,61,0.4); }
  .speech-bubble::before { content:''; position:absolute; left:-10px; top:16px; border:8px solid transparent; border-right-color:var(--yellow); border-left:0; }
  .bubble-level { font-size:10px; font-weight:700; color:#886600; letter-spacing:1px; margin-bottom:4px; }
  .bubble-question { font-size:18px; font-weight:700; color:var(--navy); line-height:1.6; }

  /* チャット */
  .chat-history { margin-bottom:12px; }
  .chat-msg { margin-bottom:10px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .chat-msg.user { text-align:right; }
  .chat-msg.user .bubble { display:inline-block; background:var(--blue); color:white; padding:10px 14px; border-radius:18px 18px 4px 18px; font-size:16px; max-width:85%; text-align:left; line-height:1.6; }
  .chat-msg.ai .bubble { display:inline-block; background:white; border:2px solid #D0DFF0; color:var(--navy); padding:10px 14px; border-radius:18px 18px 18px 4px; font-size:16px; max-width:90%; line-height:1.6; }
  .chat-msg .who { font-size:10px; color:var(--gray); margin-bottom:3px; font-weight:700; }

  /* 答えエリア */
  .answer-area { background:white; border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:12px; }
  .answer-label { font-size:13px; font-weight:700; color:var(--gray); margin-bottom:8px; }
  .answer-textarea { width:100%; min-height:80px; padding:12px; border:2px solid #D0DFF0; border-radius:12px; font-family:inherit; font-size:18px; color:var(--navy); resize:none; outline:none; line-height:1.6; transition:border-color 0.2s; }
  .answer-textarea:focus { border-color:var(--blue); }
  .btn-row { display:flex; gap:10px; }
  .send-btn { flex:1; padding:14px; background:linear-gradient(135deg,var(--green) 0%,#45A55A 100%); color:white; border:none; border-radius:14px; font-family:inherit; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 4px 14px rgba(107,203,119,0.4); transition:all 0.2s; }
  .send-btn:hover { transform:translateY(-2px); }
  .send-btn:disabled { background:#CCC; box-shadow:none; transform:none; cursor:not-allowed; }
  .next-btn { padding:14px 20px; background:linear-gradient(135deg,var(--blue) 0%,#2E6DB4 100%); color:white; border:none; border-radius:14px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(74,144,217,0.4); transition:all 0.2s; }

  /* レベルバッジ */
  .level-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:700; margin-bottom:14px; }
  .level-badge.lv1 { background:#E8F8EE; color:#27AE60; }
  .level-badge.lv2 { background:#EBF4FF; color:var(--blue); }
  .level-badge.lv3 { background:#FFF3EB; color:var(--orange); }
  .level-badge.lv4 { background:#FFF0F5; color:var(--pink); }

  /* 完了画面 */
  .complete-card { text-align:center; padding:30px 20px; }
  .complete-icon { font-size:72px; display:block; margin-bottom:12px; }
  .complete-title { font-size:26px; font-weight:900; color:var(--navy); margin-bottom:8px; }
  .complete-sub { font-size:15px; color:var(--gray); margin-bottom:24px; line-height:1.6; }
  .stars { font-size:36px; letter-spacing:4px; margin-bottom:20px; }
  .retry-btn { padding:14px 32px; background:linear-gradient(135deg,var(--yellow) 0%,#FFC107 100%); color:var(--navy); border:none; border-radius:14px; font-family:inherit; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 4px 14px rgba(255,217,61,0.4); }

  /* 画面切替 */
  .screen { display: none; }
  .screen.active { display: block; }

  /* エラー */
  .error-msg { background:#FFE8E8; border:2px solid #FF6B6B; border-radius:12px; padding:12px 16px; font-size:14px; color:#CC0000; margin-bottom:12px; display:none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-wrap">
  <div class="login-card">
    <span class="login-owl">🦉</span>
    <div class="login-title">こくごドリル</div>
    <div class="login-sub">めーるアドレスと<br>パスワードでログインしてね</div>
    <input class="login-field" type="email" id="login-email" placeholder="メールアドレス" autocomplete="email">
    <input class="login-field" type="password" id="login-pass" placeholder="パスワード" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">🔑 ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== アプリ本体（ログイン後） ===== -->
<div id="app-wrap" style="display:none;">

<!-- ヘッダー -->
<div class="header">
  <div class="header-owl">🦉</div>
  <div>
    <div class="header-title">こくごドリル</div>
    <div class="header-sub">かんがえるちからをそだてよう！</div>
  </div>
  <div class="header-right">
    <div>
      <div class="hdr-email" id="user-email"></div>
      <div style="display:flex;gap:6px;margin-top:4px;">
        <button class="hdr-btn" onclick="openPassModal()">🔒 PW変更</button>
        <button class="hdr-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </div>
  </div>
</div>

<!-- パスワード変更モーダル -->
<div class="modal-overlay" id="pass-modal">
  <div class="modal-box">
    <div class="modal-title">🔒 パスワードをかえる</div>
    <input class="modal-field" type="password" id="new-pass1" placeholder="あたらしいパスワード（6もじ以上）">
    <input class="modal-field" type="password" id="new-pass2" placeholder="もういちど いれてね">
    <div class="modal-row">
      <button class="modal-ok" onclick="doChangePass()">かえる ✓</button>
      <button class="modal-cancel" onclick="closePassModal()">もどる</button>
    </div>
    <div class="modal-msg" id="pass-msg"></div>
  </div>
</div>

<div class="main">

  <!-- 画面1: 作品選択 -->
  <div class="screen active" id="screen-select">
    <div class="card">
      <div class="section-label">📚 どのおはなし？</div>
      <div class="story-grid">
        <button class="story-btn" onclick="selectStory(this,'手袋を買いに','新美南吉')">
          <span class="story-icon">🧤</span>
          <span class="story-name">てぶくろを かいに</span>
          <span class="story-author">にいみなんきち</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'ごんぎつね','新美南吉')">
          <span class="story-icon">🦊</span>
          <span class="story-name">ごんぎつね</span>
          <span class="story-author">にいみなんきち</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'注文の多い料理店','宮沢賢治')">
          <span class="story-icon">🍽️</span>
          <span class="story-name">ちゅうもんの おおい りょうりてん</span>
          <span class="story-author">みやざわけんじ</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'セロ弾きのゴーシュ','宮沢賢治')">
          <span class="story-icon">🎻</span>
          <span class="story-name">セロひきの ゴーシュ</span>
          <span class="story-author">みやざわけんじ</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'桃太郎','日本昔話')">
          <span class="story-icon">🍑</span>
          <span class="story-name">ももたろう</span>
          <span class="story-author">にほんのむかしばなし</span>
        </button>
        <button class="story-btn" onclick="selectStory(this,'浦島太郎','日本昔話')">
          <span class="story-icon">🐢</span>
          <span class="story-name">うらしまたろう</span>
          <span class="story-author">にほんのむかしばなし</span>
        </button>
      </div>
      <div class="divider">― または じぶんで いれる ―</div>
      <input class="custom-input" type="text" id="custom-story"
        placeholder="おはなしの なまえを かいてね"
        oninput="onCustomInput(this.value)">
    </div>

    <div class="card">
      <div class="section-label">🎯 どのレベルから？</div>
      <div class="level-row">
        <button class="level-chip selected" data-lv="1" onclick="selectLevel(this,1)">
          <span class="lv-icon">📖</span><span class="lv-name">じじつ</span>
        </button>
        <button class="level-chip" data-lv="2" onclick="selectLevel(this,2)">
          <span class="lv-icon">🤔</span><span class="lv-name">りゆう</span>
        </button>
        <button class="level-chip" data-lv="3" onclick="selectLevel(this,3)">
          <span class="lv-icon">💭</span><span class="lv-name">きもち</span>
        </button>
        <button class="level-chip" data-lv="4" onclick="selectLevel(this,4)">
          <span class="lv-icon">✨</span><span class="lv-name">テーマ</span>
        </button>
      </div>
    </div>

    <div class="error-msg" id="err-select">おはなしをえらんでね！</div>
    <button class="start-btn" onclick="startDrill()">🦉 スタート！</button>
  </div>

  <!-- 画面2: ローディング -->
  <div class="screen" id="screen-loading">
    <div class="card loading-card">
      <span class="owl-spin">🦉</span>
      <div class="loading-text">もんだいをつくっているよ…</div>
      <div class="loading-sub">すこしまってね ✨</div>
    </div>
  </div>

  <!-- 画面3: ドリル -->
  <div class="screen" id="screen-drill">
    <div id="level-badge-wrap"></div>
    <div class="owl-section">
      <div class="owl-face">🦉</div>
      <div class="speech-bubble">
        <div class="bubble-level" id="bubble-level-label"></div>
        <div class="bubble-question" id="bubble-question"></div>
      </div>
    </div>
    <div class="chat-history" id="chat-history"></div>
    <div class="answer-area" id="answer-area">
      <div class="answer-label">🖊 こたえをかいてね</div>
      <textarea class="answer-textarea" id="answer-input" placeholder="ここにこたえをかこう…" rows="3"></textarea>
    </div>
    <div class="error-msg" id="err-drill">こたえをかいてからおくってね！</div>
    <div class="btn-row">
      <button class="send-btn" id="send-btn" onclick="sendAnswer()">✉️ おくる</button>
      <button class="next-btn" id="next-level-btn" onclick="nextLevel()" style="display:none">つぎのもんだい →</button>
    </div>
  </div>

  <!-- 画面4: 完了 -->
  <div class="screen" id="screen-complete">
    <div class="card complete-card">
      <span class="complete-icon">🎉</span>
      <div class="stars">⭐⭐⭐⭐</div>
      <div class="complete-title">ぜんぶできたよ！</div>
      <div class="complete-sub" id="complete-msg"></div>
      <button class="retry-btn" onclick="goHome()">🏠 もどる</button>
    </div>
  </div>

</div><!-- /.main -->
</div><!-- /#app-wrap -->

<script>
// ===== 定数 =====
const API_URL = 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
const ACCESS_KEY = 'HeartsHouse2026Key';

const LEVEL_INFO = {
  1: { label: 'レベル１ じじつ',  icon: '📖', cls: 'lv1' },
  2: { label: 'レベル２ りゆう',  icon: '🤔', cls: 'lv2' },
  3: { label: 'レベル３ きもち',  icon: '💭', cls: 'lv3' },
  4: { label: 'レベル４ テーマ',  icon: '✨', cls: 'lv4' },
};

// ===== 状態 =====
let state = {
  story: '', author: '', level: 1,
  questions: [], currentQ: 0,
  chatHistory: [], turnCount: 0,
};

// ===== Auth =====
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'めーるとパスワードをいれてね'; return; }
  try {
    await window._signIn(email, pass);
  } catch(e) {
    const msg = {
      'auth/invalid-credential': 'めーるかパスワードがちがうよ',
      'auth/user-not-found':     'このめーるはとうろくされていないよ',
      'auth/wrong-password':     'パスワードがちがうよ',
      'auth/too-many-requests':  'しばらくたってからためしてね',
    };
    errEl.textContent = msg[e.code] || 'ログインできなかったよ…もういちど';
  }
}

async function doLogout() {
  if (confirm('ログアウトしますか？')) {
    await window._signOut();
    goHome();
  }
}

// ===== パスワード変更 =====
function openPassModal() {
  document.getElementById('new-pass1').value = '';
  document.getElementById('new-pass2').value = '';
  document.getElementById('pass-msg').textContent = '';
  document.getElementById('pass-msg').className = 'modal-msg';
  document.getElementById('pass-modal').classList.add('show');
}
function closePassModal() {
  document.getElementById('pass-modal').classList.remove('show');
}
async function doChangePass() {
  const p1 = document.getElementById('new-pass1').value;
  const p2 = document.getElementById('new-pass2').value;
  const msgEl = document.getElementById('pass-msg');
  if (p1.length < 6) { msgEl.className='modal-msg err'; msgEl.textContent='6もじ以上いれてね'; return; }
  if (p1 !== p2)     { msgEl.className='modal-msg err'; msgEl.textContent='パスワードがあわないよ'; return; }
  try {
    await window._updatePassword(p1);
    msgEl.className='modal-msg ok';
    msgEl.textContent='パスワードをかえたよ！✓';
    setTimeout(closePassModal, 1800);
  } catch(e) {
    msgEl.className='modal-msg err';
    msgEl.textContent = e.code === 'auth/requires-recent-login'
      ? 'いちどログアウトして、もういちどログインしてからためしてね'
      : 'エラーがおきたよ…もういちどためしてね';
  }
}

// ===== 画面切替 =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== 作品選択 =====
function selectStory(btn, name, author) {
  document.querySelectorAll('.story-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.story = name; state.author = author;
  document.getElementById('custom-story').value = '';
}
function onCustomInput(val) {
  document.querySelectorAll('.story-btn').forEach(b => b.classList.remove('selected'));
  state.story = val.trim(); state.author = '';
}
function selectLevel(btn, lv) {
  document.querySelectorAll('.level-chip').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.level = lv;
}

// ===== スタート =====
async function startDrill() {
  const errEl = document.getElementById('err-select');
  if (!state.story) { errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  state.questions = []; state.currentQ = 0; state.chatHistory = []; state.turnCount = 0;
  document.getElementById('chat-history').innerHTML = '';
  showScreen('loading');
  await generateQuestions();
}

// ===== 問い生成（2ステップ） =====
async function generateQuestions() {
  const startLv = state.level;
  const levels = [];
  for (let l = startLv; l <= 4; l++) levels.push(l);

  const lvDescs = {
    1: 'レベル1（じじつ）：お話の中に書いてあることをそのまま答える問い',
    2: 'レベル2（りゆう）：なぜそうなったか理由を考える問い',
    3: 'レベル3（きもち）：登場人物の気持ちを想像する問い',
    4: 'レベル4（テーマ）：お話全体で作者が伝えたかったことを考える問い',
  };

  // Step1: useSearch → あらすじ取得
  let storyInfo = `「${state.story}」というお話`;
  try {
    const r1 = await callAI({
      useSearch: true,
      systemPrompt: 'あなたは小学生向けの国語の先生です。',
      userMessage: `「${state.story}」（${state.author || ''}）のあらすじと主な登場人物、重要な場面を250字程度でまとめてください。小学1年生にわかるやさしい言葉で。`,
    });
    storyInfo = extractText(r1) || storyInfo;
  } catch(e) { /* フォールバック継続 */ }

  // Step2: 問い生成（responseSchema）
  try {
    const r2 = await callAI({
      responseSchema: {
        type: 'object',
        properties: {
          questions: {
            type: 'array',
            items: {
              type: 'object',
              properties: {
                level:    { type: 'number' },
                question: { type: 'string' },
              },
              required: ['level','question'],
            },
          },
        },
        required: ['questions'],
      },
      systemPrompt: '小学1年生向け国語読解問いを生成するシステムです。ひらがな・カタカナ中心、漢字は最小限にしてください。',
      userMessage: `お話：\n${storyInfo}\n\n以下のレベルの問いを各1問生成してください：\n${levels.map(l=>lvDescs[l]).join('\n')}\n\n条件：小学1年生が読めるひらがな中心の文章で。`,
    });
    const parsed = parseJSON(extractText(r2));
    if (parsed?.questions?.length > 0) {
      state.questions = parsed.questions;
    } else throw new Error('parse fail');
  } catch(e) {
    // フォールバック
    state.questions = levels.map(l => ({ level:l, question: defaultQuestion(l, state.story) }));
  }

  showDrillScreen();
}

function defaultQuestion(lv, story) {
  return {
    1: `「${story}」に でてくる とうじょうじんぶつは だれですか？`,
    2: `「${story}」で、とうじょうじんぶつは なぜ そうしたのでしょう？`,
    3: `「${story}」の とうじょうじんぶつは どんな きもちだったと おもいますか？`,
    4: `「${story}」で、さくしゃは なにを つたえたかったと おもいますか？`,
  }[lv] || '';
}

// ===== ドリル表示 =====
function showDrillScreen() {
  showScreen('drill');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  if (!q) { showComplete(); return; }
  const info = LEVEL_INFO[q.level];
  state.turnCount = 0; state.chatHistory = [];

  document.getElementById('level-badge-wrap').innerHTML =
    `<div class="level-badge ${info.cls}">${info.icon} ${info.label}</div>`;
  document.getElementById('bubble-level-label').textContent = info.label;
  document.getElementById('bubble-question').textContent = q.question;
  document.getElementById('chat-history').innerHTML = '';
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-area').style.display = '';
  document.getElementById('send-btn').style.display = '';
  document.getElementById('next-level-btn').style.display = 'none';
  document.getElementById('err-drill').classList.remove('show');
}

// ===== 答え送信 =====
async function sendAnswer() {
  const answer = document.getElementById('answer-input').value.trim();
  if (!answer) { document.getElementById('err-drill').classList.add('show'); return; }
  document.getElementById('err-drill').classList.remove('show');

  addChatMsg('user', answer);
  document.getElementById('answer-input').value = '';
  document.getElementById('send-btn').disabled = true;

  const q = state.questions[state.currentQ];
  state.turnCount++;
  state.chatHistory.push({ role:'user', parts:[{ text:answer }] });

  try {
    const r = await callAI({
      systemPrompt: buildSystemPrompt(q.level, state.story, q.question),
      messages: state.chatHistory,
    });
    const aiText = extractText(r);
    state.chatHistory.push({ role:'model', parts:[{ text:aiText }] });
    addChatMsg('ai', aiText);
    if (state.turnCount >= 2) document.getElementById('next-level-btn').style.display = '';
  } catch(e) {
    addChatMsg('ai', 'ごめんね、もういちどおくってみてね 🦉');
  }
  document.getElementById('send-btn').disabled = false;
}

function buildSystemPrompt(level, story, question) {
  const base = `あなたは小学1年生の国語の先生「フクロウ先生」です。
「${story}」についての問い「${question}」に子どもが答えてくれています。
【必須ルール】
・ひらがな中心のやさしい言葉のみ
・答えを直接言わない
・「どこにそう書いてあった？」「なぜそうおもった？」など深掘り質問を1つ必ず入れる
・ほめ言葉から始める
・2〜4文以内。絵文字1〜2個使う`;

  const guide = {
    1: '事実の問いです。本文のどこに書いてあるか確認させてください。',
    2: '理由の問いです。「なぜかな？」と理由を引き出してください。',
    3: '気持ちの問いです。共感してから「どんなきもち？」と広げてください。',
    4: 'テーマの問いです。考えたプロセスをほめてください。正解不正解より大切に。',
  };
  return base + '\n' + guide[level];
}

// ===== チャットUI =====
function addChatMsg(role, text) {
  const el = document.createElement('div');
  el.className = `chat-msg ${role}`;
  el.innerHTML = `<div class="who">${role==='user'?'あなた':'🦉 フクロウせんせい'}</div><div class="bubble">${escHtml(text)}</div>`;
  document.getElementById('chat-history').appendChild(el);
  el.scrollIntoView({ behavior:'smooth', block:'end' });
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ===== 次のレベル =====
function nextLevel() {
  state.currentQ++;
  state.currentQ >= state.questions.length ? showComplete() : renderQuestion();
  window.scrollTo(0,0);
}

// ===== 完了 =====
function showComplete() {
  document.getElementById('complete-msg').textContent =
    `「${state.story}」を よくかんがえたね！✨\nじつは、よむたびにあたらしいことに きづくんだよ。またやってみてね！`;
  showScreen('complete');
}
function goHome() {
  state = { story:'', author:'', level:1, questions:[], currentQ:0, chatHistory:[], turnCount:0 };
  document.querySelectorAll('.story-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.level-chip').forEach(b => b.classList.remove('selected'));
  document.querySelector('.level-chip[data-lv="1"]').classList.add('selected');
  document.getElementById('custom-story').value = '';
  showScreen('select');
}

// ===== API =====
async function callAI({ systemPrompt, userMessage, messages, useSearch, responseSchema }) {
  const body = {
    model: 'gemini-2.5-flash',
    systemPrompt: systemPrompt || '',
    contents: messages || [{ role:'user', parts:[{ text: userMessage }] }],
  };
  if (useSearch)      body.useSearch = true;
  if (responseSchema) body.responseSchema = responseSchema;

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'X-Access-Key': ACCESS_KEY },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('API Error ' + res.status);
  return await res.json();
}

function extractText(d) {
  const data = d.data ?? d;
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || data?.text || d?.text || '';
}

function parseJSON(text) {
  try { return JSON.parse(text.replace(/```json|```/g,'').trim()); }
  catch(e) { return null; }
}
</script>
</body>
</html>
